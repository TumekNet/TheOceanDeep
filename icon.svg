<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Deep ocean background gradient -->
    <radialGradient id="oceanBg" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#0d3060"/>
      <stop offset="60%" stop-color="#060d1a"/>
      <stop offset="100%" stop-color="#020810"/>
    </radialGradient>

    <!-- Main bubble glow -->
    <radialGradient id="bubbleGlow" cx="38%" cy="32%" r="60%">
      <stop offset="0%" stop-color="#7ef8ff" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#00d4ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0a1f3d" stop-opacity="0"/>
    </radialGradient>

    <!-- Tail gradient -->
    <linearGradient id="tailGrad" x1="0%" y1="0%" x2="40%" y2="100%">
      <stop offset="0%" stop-color="#4169E1"/>
      <stop offset="55%" stop-color="#274553"/>
      <stop offset="100%" stop-color="#6A0DAD"/>
    </linearGradient>

    <!-- Small bubble fill -->
    <radialGradient id="smallBub" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#7ef8ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.05"/>
    </radialGradient>

    <!-- Caustic light filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Rounded square clip for maskable icon safe zone -->
    <clipPath id="rounded">
      <rect width="512" height="512" rx="96" ry="96"/>
    </clipPath>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="512" height="512" rx="96" fill="url(#oceanBg)"/>

  <!-- Subtle caustic light rays from top -->
  <g opacity="0.07">
    <line x1="180" y1="0" x2="120" y2="320" stroke="#7ef8ff" stroke-width="18" stroke-linecap="round"/>
    <line x1="256" y1="0" x2="220" y2="300" stroke="#7ef8ff" stroke-width="12" stroke-linecap="round"/>
    <line x1="340" y1="0" x2="380" y2="340" stroke="#7ef8ff" stroke-width="16" stroke-linecap="round"/>
    <line x1="420" y1="30" x2="450" y2="280" stroke="#7ef8ff" stroke-width="8" stroke-linecap="round"/>
    <line x1="100" y1="20" x2="60" y2="260" stroke="#7ef8ff" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- ── SEAWEED (bottom) ── -->
  <g opacity="0.45">
    <!-- Left seaweed -->
    <path d="M60 512 Q40 460 60 410 Q80 360 60 310 Q40 260 60 210"
      fill="none" stroke="#2ecc71" stroke-width="10" stroke-linecap="round"/>
    <path d="M90 512 Q75 475 85 440 Q95 405 80 370 Q65 335 80 300"
      fill="none" stroke="#27ae60" stroke-width="7" stroke-linecap="round"/>
    <!-- Right seaweed -->
    <path d="M452 512 Q472 460 452 410 Q432 360 452 310 Q472 260 452 210"
      fill="none" stroke="#2ecc71" stroke-width="10" stroke-linecap="round"/>
    <path d="M420 512 Q435 470 425 435 Q415 400 430 365 Q445 330 430 295"
      fill="none" stroke="#1abc9c" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- ── SMALL AMBIENT BUBBLES ── -->
  <!-- Bottom cluster -->
  <circle cx="148" cy="430" r="12" fill="url(#smallBub)" stroke="#7ef8ff" stroke-width="1.5" stroke-opacity="0.4"/>
  <circle cx="370" cy="450" r="9" fill="url(#smallBub)" stroke="#7ef8ff" stroke-width="1.5" stroke-opacity="0.35"/>
  <circle cx="310" cy="400" r="6" fill="url(#smallBub)" stroke="#7ef8ff" stroke-width="1" stroke-opacity="0.3"/>
  <circle cx="200" cy="460" r="7" fill="url(#smallBub)" stroke="#7ef8ff" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Mid scattered -->
  <circle cx="80" cy="300" r="8" fill="url(#smallBub)" stroke="#7ef8ff" stroke-width="1" stroke-opacity="0.25"/>
  <circle cx="440" cy="310" r="11" fill="url(#smallBub)" stroke="#7ef8ff" stroke-width="1.5" stroke-opacity="0.3"/>
  <circle cx="130" cy="200" r="5" fill="url(#smallBub)" stroke="#7ef8ff" stroke-width="1" stroke-opacity="0.25"/>
  <circle cx="400" cy="180" r="7" fill="url(#smallBub)" stroke="#7ef8ff" stroke-width="1" stroke-opacity="0.2"/>

  <!-- ── MAIN HERO BUBBLE ── -->
  <!-- Outer glow ring -->
  <circle cx="256" cy="230" r="158" fill="none" stroke="#00d4ff" stroke-width="3" stroke-opacity="0.15" filter="url(#glow)"/>
  <!-- Main bubble body -->
  <circle cx="256" cy="230" r="148" fill="url(#bubbleGlow)"/>
  <!-- Bubble border -->
  <circle cx="256" cy="230" r="148" fill="none" stroke="#7ef8ff" stroke-width="3.5" stroke-opacity="0.55"/>
  <!-- Inner subtle ring -->
  <circle cx="256" cy="230" r="140" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.08"/>

  <!-- Bubble shine top-left -->
  <ellipse cx="196" cy="158" rx="38" ry="24" fill="white" opacity="0.18" transform="rotate(-30 196 158)"/>
  <ellipse cx="208" cy="165" rx="16" ry="9" fill="white" opacity="0.25" transform="rotate(-30 208 165)"/>
  <!-- Small shine bottom right -->
  <ellipse cx="340" cy="310" rx="14" ry="8" fill="white" opacity="0.1" transform="rotate(-20 340 310)"/>

  <!-- ── MERMAID TAIL inside bubble ── -->
  <!-- Main tail body -->
  <path d="M210 185 C195 210 188 245 192 278 C196 312 208 345 222 368 C236 388 248 395 256 395
           C264 395 276 388 290 368 C304 345 316 312 320 278 C324 245 317 210 302 185
           C290 170 274 162 256 162 C238 162 222 170 210 185Z"
    fill="url(#tailGrad)" stroke="#1a3040" stroke-width="2.5"/>

  <!-- Tail scales -->
  <path d="M228 200 A18 10 0 0 1 246 200" fill="none" stroke="#4169E1" stroke-width="1.2" stroke-opacity="0.5"/>
  <path d="M246 200 A18 10 0 0 1 264 200" fill="none" stroke="#4169E1" stroke-width="1.2" stroke-opacity="0.5"/>
  <path d="M264 200 A18 10 0 0 1 282 200" fill="none" stroke="#4169E1" stroke-width="1.2" stroke-opacity="0.5"/>

  <path d="M219 218 A18 10 0 0 1 237 218" fill="none" stroke="#4169E1" stroke-width="1.2" stroke-opacity="0.5"/>
  <path d="M237 218 A18 10 0 0 1 255 218" fill="none" stroke="#4169E1" stroke-width="1.2" stroke-opacity="0.5"/>
  <path d="M255 218 A18 10 0 0 1 273 218" fill="none" stroke="#4169E1" stroke-width="1.2" stroke-opacity="0.5"/>
  <path d="M273 218 A18 10 0 0 1 291 218" fill="none" stroke="#4169E1" stroke-width="1.2" stroke-opacity="0.5"/>

  <path d="M212 236 A18 10 0 0 1 230 236" fill="none" stroke="#274553" stroke-width="1.2" stroke-opacity="0.5"/>
  <path d="M230 236 A18 10 0 0 1 248 236" fill="none" stroke="#274553" stroke-width="1.2" stroke-opacity="0.5"/>
  <path d="M248 236 A18 10 0 0 1 266 236" fill="none" stroke="#274553" stroke-width="1.2" stroke-opacity="0.5"/>
  <path d="M266 236 A18 10 0 0 1 284 236" fill="none" stroke="#274553" stroke-width="1.2" stroke-opacity="0.5"/>
  <path d="M284 236 A18 10 0 0 1 302 236" fill="none" stroke="#274553" stroke-width="1.2" stroke-opacity="0.5"/>

  <path d="M210 254 A18 10 0 0 1 228 254" fill="none" stroke="#274553" stroke-width="1.2" stroke-opacity="0.45"/>
  <path d="M228 254 A18 10 0 0 1 246 254" fill="none" stroke="#274553" stroke-width="1.2" stroke-opacity="0.45"/>
  <path d="M246 254 A18 10 0 0 1 264 254" fill="none" stroke="#274553" stroke-width="1.2" stroke-opacity="0.45"/>
  <path d="M264 254 A18 10 0 0 1 282 254" fill="none" stroke="#274553" stroke-width="1.2" stroke-opacity="0.45"/>
  <path d="M282 254 A18 10 0 0 1 300 254" fill="none" stroke="#274553" stroke-width="1.2" stroke-opacity="0.45"/>

  <!-- Tail highlight shimmer -->
  <path d="M220 190 C215 220 214 255 218 285 C222 310 228 332 236 350"
    fill="none" stroke="#87CEEB" stroke-width="6" stroke-linecap="round" stroke-opacity="0.25"/>

  <!-- Hip fin left -->
  <path d="M205 185 C182 175 162 182 156 198 C150 212 160 228 175 225 C188 222 198 210 205 195Z"
    fill="#4169E1" stroke="#1a3040" stroke-width="2" opacity="0.9"/>
  <path d="M203 188 C183 180 167 186 163 198 C160 208 167 220 178 218Z"
    fill="#274553" opacity="0.6"/>

  <!-- Tail fin left -->
  <path d="M215 358 C196 372 174 388 166 378 C157 367 170 348 188 342 C202 337 214 346 215 358Z"
    fill="#6A0DAD" stroke="#1a3040" stroke-width="2"/>
  <path d="M215 358 C200 365 182 376 176 370 C170 363 179 350 192 346Z"
    fill="#4169E1" opacity="0.65"/>

  <!-- Tail fin right -->
  <path d="M297 358 C316 372 338 388 346 378 C355 367 342 348 324 342 C310 337 298 346 297 358Z"
    fill="#6A0DAD" stroke="#1a3040" stroke-width="2"/>
  <path d="M297 358 C312 365 330 376 336 370 C342 363 333 350 320 346Z"
    fill="#4169E1" opacity="0.65"/>

  <!-- ── STARS / SPARKLES inside bubble ── -->
  <g filter="url(#softGlow)" opacity="0.9">
    <!-- Top star -->
    <path d="M256 108 L260 120 L272 120 L262 128 L266 140 L256 132 L246 140 L250 128 L240 120 L252 120Z"
      fill="#ffd700" opacity="0.95"/>
    <!-- Small stars -->
    <path d="M170 150 L172 156 L178 156 L173 160 L175 166 L170 162 L165 166 L167 160 L162 156 L168 156Z"
      fill="#ffd700" opacity="0.7" transform="scale(0.7) translate(73 68)"/>
    <path d="M340 145 L342 151 L348 151 L343 155 L345 161 L340 157 L335 161 L337 155 L332 151 L338 151Z"
      fill="#7ef8ff" opacity="0.65" transform="scale(0.65) translate(183 78)"/>
  </g>

  <!-- ── TEXT ── -->
  <!-- "BUBBLE" -->
  <text x="256" y="472"
    font-family="'Arial Rounded MT Bold', 'Nunito', Arial, sans-serif"
    font-size="52" font-weight="900"
    text-anchor="middle"
    fill="none"
    stroke="#060d1a" stroke-width="6">BUBBLE POP!</text>
  <text x="256" y="472"
    font-family="'Arial Rounded MT Bold', 'Nunito', Arial, sans-serif"
    font-size="52" font-weight="900"
    text-anchor="middle"
    fill="url(#bubbleGradText)">BUBBLE POP!</text>

  <defs>
    <linearGradient id="bubbleGradText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7ef8ff"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
</svg>
